<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrador</title>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <div class="login-container" style="margin-top:4rem;">
        <h1>Login Administrador</h1>
        <form id="adminLoginForm">
            <input type="text" id="adminUser" placeholder="Usuário" required autofocus>
            <input type="password" id="adminPass" placeholder="Senha" required>
            <button type="submit" class="btn-highlight">Entrar</button>
            <p id="adminLoginMessage" class="message"></p>
        </form>
    </div>
    <script src="js/admin-login.js"></script>
</body>
</html>
